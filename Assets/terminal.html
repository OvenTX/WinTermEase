<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    #terminal-container {
      width: 100%;
      height: 100%;
      padding: 4px;
    }
    /* Override xterm default font metrics to avoid blur */
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: scroll !important; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"/>
</head>
<body>
  <div id="terminal-container">
    <div id="terminal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.min.js"></script>

  <script>
    // ─── Terminal init ────────────────────────────────────────────────────────
    const term = new Terminal({
      fontFamily: 'Cascadia Code, Cascadia Mono, Consolas, "Courier New", monospace',
      fontSize: 14,
      lineHeight: 1.2,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 5000,
      theme: {
        background:    '#1e1e1e',
        foreground:    '#cccccc',
        cursor:        '#cccccc',
        cursorAccent:  '#1e1e1e',
        black:         '#000000',
        red:           '#cd3131',
        green:         '#0dbc79',
        yellow:        '#e5e510',
        blue:          '#2472c8',
        magenta:       '#bc3fbc',
        cyan:          '#11a8cd',
        white:         '#e5e5e5',
        brightBlack:   '#666666',
        brightRed:     '#f14c4c',
        brightGreen:   '#23d18b',
        brightYellow:  '#f5f543',
        brightBlue:    '#3b8eea',
        brightMagenta: '#d670d6',
        brightCyan:    '#29b8db',
        brightWhite:   '#e5e5e5',
        selectionBackground: '#264f78',
      },
      allowProposedApi: true,
    });

    const fitAddon     = new FitAddon.FitAddon();
    const linksAddon   = new WebLinksAddon.WebLinksAddon();
    const searchAddon  = new SearchAddon.SearchAddon();

    term.loadAddon(fitAddon);
    term.loadAddon(linksAddon);
    term.loadAddon(searchAddon);

    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // ─── Resize observer ─────────────────────────────────────────────────────
    const ro = new ResizeObserver(() => {
      fitAddon.fit();
      postToHost({ type: 'resize', cols: term.cols, rows: term.rows });
    });
    ro.observe(document.getElementById('terminal-container'));

    // ─── User input → C# host ────────────────────────────────────────────────
    term.onData(data => {
      postToHost({ type: 'input', data: data });
    });

    // ─── Select-to-copy: auto-copy selected text ─────────────────────────────
    term.onSelectionChange(() => {
      if (term.hasSelection()) {
        const sel = term.getSelection();
        if (sel) navigator.clipboard.writeText(sel).catch(() => {});
      }
    });

    // ─── Right-click to paste from clipboard ─────────────────────────────────
    document.getElementById('terminal-container').addEventListener('contextmenu', (e) => {
      e.preventDefault();
      postToHost({ type: 'paste_request' });
    });

    // ─── C# host → xterm.js ─────────────────────────────────────────────────
    // Messages from C# are JSON strings posted via PostWebMessageAsString
    window.chrome.webview.addEventListener('message', e => {
      try {
        const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        switch (msg.type) {
          case 'data':
            // payload is base64-encoded bytes; decode to Uint8Array for correct binary handling
            term.write(base64ToUint8Array(msg.payload));
            break;
          case 'clear':
            term.clear();
            break;
          case 'settings':
            applySettings(msg.settings);
            break;
          case 'search':
            searchAddon.findNext(msg.query, { caseSensitive: false, wholeWord: false });
            break;
        }
      } catch(err) {
        console.error('Message parse error:', err);
      }
    });

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function postToHost(obj) {
      try {
        // 直接传对象，C# 端通过 WebMessageAsJson 接收到标准 JSON 字符串
        window.chrome.webview.postMessage(obj);
      } catch(e) { /* webview not ready */ }
    }

    function base64ToUint8Array(b64) {
      const binStr = atob(b64);
      const bytes = new Uint8Array(binStr.length);
      for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
      return bytes;
    }

    function applySettings(s) {
      if (s.fontSize)    term.options.fontSize    = s.fontSize;
      if (s.fontFamily)  term.options.fontFamily  = s.fontFamily;
      if (s.scrollback)  term.options.scrollback  = s.scrollback;
      if (s.theme)       term.options.theme       = s.theme;
      fitAddon.fit();
    }

    // ─── Notify host that terminal is ready ──────────────────────────────────
    window.addEventListener('load', () => {
      postToHost({ type: 'ready', cols: term.cols, rows: term.rows });
    });
  </script>
</body>
</html>
